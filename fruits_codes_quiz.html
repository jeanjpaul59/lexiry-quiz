<!DOCTYPE html>
<html lang='fr'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>fruits_codes</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7f7; color: #222; }
    .wrap { max-width: 760px; margin: 0 auto; }
    h1 { margin-bottom: 6px; line-height: 1.2; }
    .subtitle { color: #666; margin-bottom: 18px; }
    .stats { margin-bottom: 18px; color: #444; font-size: 16px; line-height: 1.5; }
    .toolbar-top { margin-bottom: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .question { font-size: 32px; font-weight: bold; margin-bottom: 12px; line-height: 1.3; word-break: break-word; }
    .note { color: #1f4e79; font-size: 18px; margin-bottom: 18px; line-height: 1.4; }
    input[type='text'] { width: 100%; padding: 14px; font-size: 24px; border: 1px solid #bbb; border-radius: 8px; box-sizing: border-box; }
    .toolbar { margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; }
    button { padding: 14px 18px; font-size: 16px; cursor: pointer; min-height: 48px; }
    .feedback { margin-top: 18px; min-height: 60px; font-size: 20px; line-height: 1.4; }
    .ok { color: #0a7a20; font-weight: bold; }
    .ko { color: #b00020; font-weight: bold; }
    .warn { color: #9a6700; font-weight: bold; }
    .solution { margin-top: 8px; color: #003366; font-size: 24px; font-weight: bold; word-break: break-word; }
    .done { text-align: center; padding: 36px; }
    .done-score { font-size: 30px; font-weight: bold; margin: 16px 0; }
    @media (max-width: 600px) {
      body { margin: 12px; }
      .wrap { max-width: 100%; }
      h1 { font-size: 28px; }
      .subtitle { font-size: 18px; }
      .stats { font-size: 15px; }
      .card { padding: 16px; border-radius: 10px; }
      .question { font-size: 24px; margin-bottom: 10px; }
      .note { font-size: 17px; margin-bottom: 14px; }
      input[type='text'] { font-size: 22px; padding: 12px; }
      .toolbar-top, .toolbar { gap: 10px; }
      .toolbar-top button, .toolbar button { width: 100%; }
      .feedback { font-size: 18px; min-height: 50px; }
      .solution { font-size: 22px; }
      .done { padding: 24px 12px; }
      .done-score { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class='wrap'>
    <h1>fruits_codes</h1>
    <div class='subtitle'>FR-N°</div>
    <div class='toolbar-top'>
      <button onclick='restartAll()'>Recommencer tout</button>
      <button onclick='reviewPending()'>Revoir erreurs / non répondu</button>
      <button onclick='shuffleQuestions()'>Mélanger les questions</button>
      <button onclick='resetProgress()'>Réinitialiser la progression</button>
    </div>
    <div class='stats' id='stats'></div>
    <div class='card' id='quizCard'>
      <div class='question' id='question'></div>
      <div class='note' id='note'></div>
      <input type='text' id='userAnswer' autocomplete='off' autocapitalize='off' autocorrect='off' spellcheck='false' inputmode='text'>
      <div class='toolbar'>
        <button onclick='checkAnswer()'>Vérifier</button>
        <button onclick='nextQuestion()'>Suivant</button>
      </div>
      <div class='feedback' id='feedback'></div>
    </div>
  </div>
  <script>
    const quizId = 25;
    const storageKey = 'lexiry_quiz_' + quizId;
    const orderKey = storageKey + '_order';
    const items = [
      {id: 631, q: "MELON CHARENTAIS", note: "", a: "763"},
      {id: 632, q: "MELON GALIA", note: "", a: "190"},
      {id: 633, q: "MELON JAUNE", note: "", a: "185"},
      {id: 634, q: "MELON VERT", note: "", a: "256"},
      {id: 635, q: "MIRABELLE", note: "", a: "22055"},
      {id: 636, q: "MÛRE 125G", note: "", a: "657"},
      {id: 637, q: "MYRTILLE 125G", note: "", a: "404"},
      {id: 638, q: "NECTARINE", note: "", a: "254"},
      {id: 639, q: "NÈFLES", note: "", a: "356"},
      {id: 640, q: "NOIX DE COCO", note: "", a: "333"},
      {id: 641, q: "NOIX DE COCO FRAÎCHE", note: "", a: "21258"},
      {id: 642, q: "ORANGE EXTRA", note: "", a: "280"},
      {id: 643, q: "ORANGE FEUILLE", note: "", a: "16699"},
      {id: 644, q: "ORANGE FILET 2KG", note: "", a: "743"},
      {id: 645, q: "PAMPLEMOUSSE", note: "", a: "237"},
      {id: 646, q: "PAPAYE", note: "", a: "348"},
      {id: 647, q: "PASTÈQUE", note: "", a: "444"},
      {id: 648, q: "PASTÈQUE RAYÉE", note: "", a: "107989"},
      {id: 649, q: "PÊCHE", note: "", a: "173"},
      {id: 650, q: "PÊCHE PLATE", note: "", a: "189"},
      {id: 651, q: "PITAYA JAUNE", note: "", a: "3908"},
      {id: 652, q: "PITAYA ROUGE", note: "", a: "118095"},
      {id: 653, q: "POIRE CONFÉRENCE 2KG", note: "", a: "24906"},
      {id: 654, q: "POIRE COMICE", note: "", a: "24909"},
      {id: 655, q: "POIRE WILLIAMS", note: "", a: "24907"},
      {id: 656, q: "POIRE NASHI", note: "", a: "384"},
      {id: 657, q: "POIRE FORELLE", note: "", a: "443"},
      {id: 658, q: "POIRE ABATE", note: "", a: "25125"},
      {id: 659, q: "POMME GRANNY", note: "", a: "24890"},
      {id: 660, q: "POMME GOLDEN 2KG", note: "", a: "24899"},
      {id: 661, q: "POMME GOLDEN", note: "", a: "172"},
      {id: 662, q: "POMME CANADA", note: "", a: "24902"},
      {id: 663, q: "POMME CHANTECLERC", note: "", a: "24904"},
      {id: 664, q: "POMME PINK LADY", note: "", a: "320"},
      {id: 665, q: "PRUNE JAUNE", note: "", a: "442"},
      {id: 666, q: "PRUNE REINE CLAUDE", note: "", a: "21086"},
      {id: 667, q: "PRUNE ROUGE", note: "", a: "15786"},
      {id: 668, q: "POMELOS CHINOIS", note: "", a: "504"},
      {id: 669, q: "RAISIN BLANC", note: "", a: "262"},
      {id: 670, q: "RAISIN NOIR", note: "", a: "438"},

      {id: 676, q: "DATES MEDJOUL 750G", note: "", a: "118541"},
      {id: 677, q: "GRAND PANIER FRUITS", note: "", a: "2073"},
      {id: 678, q: "PETIT PANIER FRUITS", note: "", a: "2074"},
      {id: 679, q: "SALADES 4 FRUITS", note: "", a: "115544"},
      {id: 680, q: "ABRICOT", note: "", a: "257"},
      {id: 681, q: "AMANDE FRAÎCHE", note: "", a: "202"},
      {id: 682, q: "ANANAS", note: "", a: "227"},
      {id: 683, q: "ANANAS AVION", note: "", a: "385"},
      {id: 684, q: "ANANAS VICTORIA", note: "", a: "343"},
      {id: 685, q: "BANANE", note: "", a: "239"},

      {id: 687, q: "BANANE COLIS", note: "", a: "421"},
      {id: 688, q: "BANANE VERTE", note: "", a: "264"},
      {id: 689, q: "CERISE", note: "", a: "258"},
      {id: 690, q: "CERISE 2KG", note: "", a: "22543"},
      {id: 691, q: "CITRON FILET", note: "", a: "1553"},
      {id: 692, q: "CITRON JAUNE", note: "", a: "205"},
      {id: 693, q: "CITRON VERT", note: "", a: "219"},
      {id: 694, q: "CLÉMENTINE 1KG", note: "", a: "1294"},
      {id: 695, q: "CLÉMENTINE COLIS", note: "", a: "890"},
      {id: 696, q: "CLÉMENTINE EXTRA", note: "", a: "541"},
      {id: 697, q: "CLÉMENTINE FEUILLE", note: "", a: "304"},
      {id: 698, q: "COING", note: "", a: "307"},
      {id: 699, q: "FIGUE DE BARBARIE", note: "", a: "454"},
      {id: 700, q: "FIGUE FRAÎCHE", note: "", a: "279"},
      {id: 701, q: "FRAISE 1KG", note: "", a: "772"},
      {id: 702, q: "FRAISE BARQUETTE 250G", note: "", a: "118159"},
      {id: 703, q: "FRAISE BARQUETTE 500G", note: "", a: "393"},
      {id: 704, q: "FRAMBOISE 125G", note: "", a: "274"},
      {id: 705, q: "FRUIT DE LA PASSION", note: "", a: "21305"},
      {id: 706, q: "GRENADE", note: "", a: "297"},
      {id: 707, q: "GRENADILLE", note: "", a: "3909"},
      {id: 708, q: "GROSEILLES", note: "", a: "785"},
      {id: 709, q: "KAKI", note: "", a: "313"},
      {id: 710, q: "KIWI VERT", note: "", a: "347"},
      {id: 711, q: "KIWI GOLD", note: "", a: "197"},
      {id: 712, q: "LITCHI", note: "", a: "3298"},
      {id: 713, q: "MANGUE", note: "", a: "247"},
      {id: 714, q: "MANGUE AVION", note: "", a: "306"}
    ];
    let currentItems = [...items];
    let currentIndex = 0;
    let score = 0;
    let checked = false;
    let currentMode = 'all';
    let savedResults = JSON.parse(localStorage.getItem(storageKey) || '{}');
    let sessionScored = {};
    function normalizeText(s) {
      return (s || '').trim().replace(/\s+/g, ' ').toLowerCase();
    }
    function saveResults() {
      localStorage.setItem(storageKey, JSON.stringify(savedResults));
    }
    function saveOrder() {
      localStorage.setItem(orderKey, JSON.stringify(currentItems.map(item => item.id)));
    }
    function loadSavedOrder() {
      const savedOrder = JSON.parse(localStorage.getItem(orderKey) || 'null');
      if (!savedOrder || !Array.isArray(savedOrder) || savedOrder.length !== items.length) return false;
      const map = new Map(items.map(item => [item.id, item]));
      const reordered = savedOrder.map(id => map.get(id)).filter(Boolean);
      if (reordered.length !== items.length) return false;
      currentItems = reordered;
      return true;
    }
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }
    function getItemState(itemId) {
      const r = savedResults[itemId];
      if (!r || !r.status) return 'unanswered';
      return r.status;
    }
    function getAnsweredCount() {
      return items.filter(item => {
        const st = getItemState(item.id);
        return st === 'correct' || st === 'incorrect';
      }).length;
    }
    function getCorrectCount() {
      return items.filter(item => getItemState(item.id) === 'correct').length;
    }
    function getPendingItems() {
      return items.filter(item => getItemState(item.id) !== 'correct');
    }
    function updateStats() {
      const answered = getAnsweredCount();
      const correct = getCorrectCount();
      const modeLabel = (currentMode === 'pending') ? 'Mode : erreurs / non répondu' : 'Mode : tout';
      document.getElementById('stats').textContent =
        modeLabel + ' — Question ' + (currentItems.length === 0 ? 0 : currentIndex + 1) + ' / ' + currentItems.length +
        ' — Score session : ' + score +
        ' — Validés : ' + correct + ' / ' + items.length +
        ' — Répondus : ' + answered + ' / ' + items.length;
    }
    function renderQuestion() {
      if (currentItems.length === 0) { renderEmpty(); return; }
      if (currentIndex >= currentItems.length) { renderDone(); return; }
      const item = currentItems[currentIndex];
      document.getElementById('question').textContent = item.q;
      document.getElementById('note').textContent = item.note ? '[' + item.note + ']' : '';
      document.getElementById('userAnswer').value = '';
      document.getElementById('feedback').innerHTML = '';
      document.getElementById('userAnswer').focus();
      checked = false;
      updateStats();
    }
    function checkAnswer() {
      if (currentIndex >= currentItems.length || checked) return;
      const item = currentItems[currentIndex];
      const rawValue = document.getElementById('userAnswer').value;
      const trimmedRawValue = (rawValue || '').trim();
      const userValue = normalizeText(rawValue);
      const goodValue = normalizeText(item.a);
      const fb = document.getElementById('feedback');
      if (trimmedRawValue === '') {
        fb.innerHTML = '<div class="warn">Veuillez saisir une réponse.</div>';
        document.getElementById('userAnswer').focus();
        return false;
      }
      const isCorrect = (userValue === goodValue);
      if (isCorrect && !sessionScored[item.id]) {
        score += 1;
        sessionScored[item.id] = true;
      }
      if (isCorrect) {
        fb.innerHTML = '<div class="ok">&#10004; Correct</div><div class="solution">' + item.a + '</div>';
      } else {
        fb.innerHTML = '<div class="ko">&#10008; Incorrect</div><div class="solution">' + item.a + '</div>';
      }
      savedResults[item.id] = {
        status: isCorrect ? 'correct' : 'incorrect',
        correct: isCorrect,
        userAnswer: rawValue,
        attempts: (savedResults[item.id] ? savedResults[item.id].attempts : 0) + 1
      };
      saveResults();
      checked = true;
      updateStats();
    }
    function nextQuestion() {
      if (!checked) {
        const rawValue = document.getElementById('userAnswer').value;
        const trimmedRawValue = (rawValue || '').trim();
        if (trimmedRawValue !== '') {
          checkAnswer();
        }
      }
      currentIndex += 1;
      renderQuestion();
    }
    function rebuildQuizCard() {
      document.getElementById('quizCard').innerHTML =
        '<div class="question" id="question"></div>' +
        '<div class="note" id="note"></div>' +
        '<input type="text" id="userAnswer" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text">' +
        '<div class="toolbar">' +
        '<button onclick="checkAnswer()">Vérifier</button>' +
        '<button onclick="nextQuestion()">Suivant</button>' +
        '</div>' +
        '<div class="feedback" id="feedback"></div>';
    }
    function shuffleQuestions() {
      currentMode = 'all';
      currentItems = [...items];
      shuffleArray(currentItems);
      currentIndex = 0;
      score = 0;
      sessionScored = {};
      checked = false;
      saveOrder();
      rebuildQuizCard();
      renderQuestion();
    }
    function restartAll() {
      currentMode = 'all';
      if (!loadSavedOrder()) {
        currentItems = [...items];
      }
      currentIndex = 0;
      score = 0;
      sessionScored = {};
      checked = false;
      rebuildQuizCard();
      renderQuestion();
    }
    function reviewPending() {
      const pendingItems = getPendingItems();
      if (pendingItems.length === 0) {
        alert('Tout est validé.');
        return;
      }
      currentMode = 'pending';
      currentItems = pendingItems;
      currentIndex = 0;
      score = 0;
      sessionScored = {};
      checked = false;
      rebuildQuizCard();
      renderQuestion();
    }
    function resetProgress() {
      if (confirm('Effacer la progression mémorisée ?')) {
        localStorage.removeItem(storageKey);
        localStorage.removeItem(orderKey);
        savedResults = {};
        sessionScored = {};
        currentItems = [...items];
        restartAll();
      }
    }
    function renderDone() {
      const percent = currentItems.length ? Math.round((score / currentItems.length) * 100) : 0;
      const pendingCount = getPendingItems().length;
      document.getElementById('quizCard').innerHTML =
        '<div class="done">' +
        '<h2>Session terminée</h2>' +
        '<div class="done-score">' + score + ' / ' + currentItems.length + ' (' + percent + '%)</div>' +
        '<div style="margin-bottom:16px;">Éléments restant à valider : ' + pendingCount + '</div>' +
        '<button onclick="restartAll()">Recommencer tout</button> ' +
        '<button onclick="reviewPending()">Revoir erreurs / non répondu</button>' +
        '</div>';
      updateStats();
    }
    function renderEmpty() {
      document.getElementById('quizCard').innerHTML =
        '<div class="done">' +
        '<h2>Aucun élément à afficher</h2>' +
        '<button onclick="restartAll()">Recommencer tout</button>' +
        '</div>';
      updateStats();
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (!checked) { checkAnswer(); } else { nextQuestion(); }
      }
    });
    loadSavedOrder();
    renderQuestion();
  </script>
</body>
</html>
