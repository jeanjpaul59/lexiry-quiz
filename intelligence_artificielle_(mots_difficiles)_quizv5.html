<!DOCTYPE html>
<html lang='fr'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Intelligence artificielle (mots difficiles)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7f7; color: #222; }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { margin-bottom: 6px; line-height: 1.2; }
    .subtitle { color: #666; margin-bottom: 18px; }
    .toolbar-top { margin-bottom: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    .toolbar-top button { padding: 12px 16px; font-size: 15px; cursor: pointer; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .topline { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .counter { font-size: 18px; color: #444; }
    .question-label, .answer-label { font-weight: bold; font-size: 16px; margin-bottom: 8px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .panel { border: 1px solid #d8d8d8; border-radius: 10px; padding: 14px; min-height: 140px; background: #fafafa; }
    .question { font-size: 34px; font-weight: bold; line-height: 1.3; word-break: break-word; }
    .note { margin-top: 12px; color: #1f4e79; font-size: 18px; line-height: 1.4; }
    .answer-wrap { display: flex; gap: 10px; align-items: stretch; }
    .answer-main { flex: 1; }
    input[type='text'] { width: 100%; padding: 14px; font-size: 34px; border: 1px solid #bbb; border-radius: 8px; box-sizing: border-box; }
    .help-btn { width: 64px; min-width: 64px; border: 1px solid #7ea1c9; background: #dfeaf8; border-radius: 8px; font-size: 28px; cursor: pointer; }
    .help-btn:disabled { opacity: 0.5; cursor: default; }
    .info-row { margin-top: 18px; display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 12px; }
    .info-box { border: 1px solid #ddd; background: #fafafa; border-radius: 8px; padding: 10px 12px; }
    .info-label { color: #666; font-size: 13px; margin-bottom: 4px; }
    .info-value { font-size: 20px; }
    .review-yes { color: #b00020; font-weight: bold; }
    .review-no { color: #0a7a20; font-weight: bold; }
    .nav-row { margin-top: 18px; display: grid; grid-template-columns: 1fr 160px 1fr; gap: 10px; align-items: center; }
    .nav-row button { padding: 14px 18px; font-size: 18px; min-height: 52px; cursor: pointer; }
    .langpair { text-align: center; border: 1px solid #ddd; background: #fafafa; border-radius: 8px; padding: 14px 10px; font-size: 20px; }
    .status-line { margin-top: 14px; min-height: 28px; font-size: 16px; }
    .warn { color: #9a6700; font-weight: bold; }
    .ok { color: #0a7a20; font-weight: bold; }
    .done { text-align: center; padding: 36px; }
    .done h2 { margin-bottom: 16px; }
    .done .big { font-size: 28px; font-weight: bold; margin-bottom: 18px; }
    @media (max-width: 760px) {
      body { margin: 12px; }
      .grid2 { grid-template-columns: 1fr; }
      .question { font-size: 26px; }
      input[type='text'] { font-size: 26px; }
      .info-row { grid-template-columns: 1fr 1fr; }
      .nav-row { grid-template-columns: 1fr; }
      .langpair { order: -1; }
      .toolbar-top button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class='wrap'>
    <h1>Intelligence artificielle (mots difficiles)</h1>
    <div class='subtitle'>FR-RU</div>
    <div class='toolbar-top'>
      <button onclick='restartSession()'>Recommencer cette session</button>
      <button onclick='reviewPending()'>Revoir éléments non validés</button>
      <button onclick='shuffleQuestions()'>Mélanger les questions</button>
      <button onclick='resetProgress()'>Réinitialiser la progression</button>
    </div>
    <div class='card' id='quizCard'></div>
  </div>
  <script>
    const quizId = 28;
    const storageKey = 'lexiry_typing_' + quizId;
    const orderKey = storageKey + '_order';
    const items = [
      {id: 781, q: " reconnaître ", a: "распознать / распознавать", note: "v.,imp/perf", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 5},
      {id: 782, q: " prédire ", a: "предсказывать", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 2},
      {id: 783, q: " entraîner ", a: "обучать", note: " (модель)", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 1},
      {id: 784, q: " analyser ", a: "анализировать", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 2},
      {id: 785, q: " inquiétude ", a: "опасение", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 1},
      {id: 786, q: " protection ", a: "защита", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 1},
      {id: 787, q: " remplacement ", a: "замена", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 1},
      {id: 788, q: " fuite de données ", a: "утечка данных", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 2},
      {id: 789, q: " menace ", a: "угроза", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 1},
      {id: 790, q: " utiliser ", a: "использовать", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 2},
      {id: 791, q: " préoccupation ", a: "беспокойство", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 2},
      {id: 792, q: " transparence ", a: "прозрачность", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 2},
      {id: 793, q: " traiter ", a: "обрабатывать", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 2},
      {id: 794, q: " créer ", a: "создавать", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 1},
      {id: 795, q: " chômage ", a: "безработица", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 2},
      {id: 796, q: " développeur ", a: "разработчик", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 2},
      {id: 797, q: " développer ", a: "разрабатывать", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 2},
      {id: 798, q: " améliorer ", a: "улучшать", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 1},
      {id: 799, q: " remplacer ", a: "заменять", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 1},
      {id: 800, q: " piratage ", a: "взлом", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 1},
      {id: 801, q: " panne ", a: "сбой", note: "", levelId: 1, levelName: "Débutant", charsPerAllowedError: 5, allowedErrors: 0}
    ];
    let currentItems = [...items];
    let currentIndex = 0;
    let currentMode = 'all';
    let savedResults = JSON.parse(localStorage.getItem(storageKey) || '{}');
    function saveResults() {
      localStorage.setItem(storageKey, JSON.stringify(savedResults));
    }
    function saveOrder() {
      localStorage.setItem(orderKey, JSON.stringify(currentItems.map(item => item.id)));
    }
    function loadSavedOrder() {
      const savedOrder = JSON.parse(localStorage.getItem(orderKey) || 'null');
      if (!savedOrder || !Array.isArray(savedOrder) || savedOrder.length !== items.length) return false;
      const map = new Map(items.map(item => [item.id, item]));
      const reordered = savedOrder.map(id => map.get(id)).filter(Boolean);
      if (reordered.length !== items.length) return false;
      currentItems = reordered;
      return true;
    }
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }
    function getDefaultState(item) {
      return {
        userAnswer: '',
        errorCount: 0,
        helpCount: 0,
        isCorrect: false,
        isMarkedForReview: true,
        status: 'unanswered'
      };
    }
    function getState(item) {
      if (!savedResults[item.id]) {
        savedResults[item.id] = getDefaultState(item);
      }
      return savedResults[item.id];
    }
    function recomputeState(item) {
      const st = getState(item);
      const isCorrect = (st.userAnswer === item.a);
      st.isCorrect = isCorrect;
      if (isCorrect) {
        st.isMarkedForReview = (st.errorCount > item.allowedErrors);
        st.status = st.isMarkedForReview ? 'review' : 'correct';
      } else {
        st.isMarkedForReview = true;
        st.status = (st.userAnswer === '') ? 'unanswered' : 'partial';
      }
      saveResults();
    }
    function getPendingItems() {
      return items.filter(item => {
        const st = getState(item);
        return !(st.isCorrect === true && st.isMarkedForReview === false);
      });
    }
    function getValidCount() {
      return items.filter(item => {
        const st = getState(item);
        return st.isCorrect === true && st.isMarkedForReview === false;
      }).length;
    }
    function getCorrectCount() {
      return items.filter(item => getState(item).isCorrect === true).length;
    }
    function getStartedCount() {
      return items.filter(item => getState(item).userAnswer !== '').length;
    }
    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function renderQuestion() {
      const card = document.getElementById('quizCard');
      if (currentItems.length === 0) { renderEmpty(); return; }
      if (currentIndex < 0) currentIndex = 0;
      if (currentIndex >= currentItems.length) { renderDone(); return; }
      const item = currentItems[currentIndex];
      const st = getState(item);
      recomputeState(item);
      card.innerHTML =
        '<div class="topline">' +
          '<div class="counter">Question ' + (currentIndex + 1) + ' / ' + currentItems.length + '</div>' +
          '<div class="counter">Validés : ' + getValidCount() + ' / ' + items.length + ' — Commencés : ' + getStartedCount() + ' / ' + items.length + '</div>' +
        '</div>' +
        '<div class="grid2">' +
          '<div>' +
            '<div class="question-label">Question</div>' +
            '<div class="panel"><div class="question">' + escapeHtml(item.q) + '</div>' + (item.note ? '<div class="note">[' + escapeHtml(item.note) + ']</div>' : '') + '</div>' +
          '</div>' +
          '<div>' +
            '<div class="answer-label">Réponse</div>' +
            '<div class="panel"><div class="answer-wrap"><div class="answer-main"><input type="text" id="userAnswer" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" value="' + escapeHtml(st.userAnswer) + '"></div><button class="help-btn" id="btnHelp" title="Révéler la lettre suivante">?</button></div><div class="status-line" id="statusLine"></div></div>' +
          '</div>' +
        '</div>' +
        '<div class="nav-row">' +
          '<button id="btnPrev">&lt;-- Précédent</button>' +
          '<div class="langpair">' + escapeHtml('FR-RU') + '</div>' +
          '<button id="btnNext">Suivant --&gt;</button>' +
        '</div>' +
        '<div class="info-row">' +
          '<div class="info-box"><div class="info-label">Nb d’erreurs</div><div class="info-value" id="errorCount">' + st.errorCount + '</div></div>' +
          '<div class="info-box"><div class="info-label">Nb d’erreurs autorisées</div><div class="info-value">' + item.allowedErrors + '</div></div>' +
          '<div class="info-box"><div class="info-label">Tolérance d’erreurs</div><div class="info-value">' + escapeHtml(item.levelName || '') + '</div></div>' +
          '<div class="info-box"><div class="info-label">À revoir</div><div id="reviewFlag" class="info-value ' + (st.isMarkedForReview ? 'review-yes' : 'review-no') + '">' + (st.isMarkedForReview ? 'Oui' : 'Non') + '</div></div>' +
        '</div>';
      const input = document.getElementById('userAnswer');
      const btnHelp = document.getElementById('btnHelp');
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
      btnPrev.disabled = (currentIndex === 0);
      btnHelp.disabled = st.isCorrect || st.userAnswer.length >= item.a.length;
      updateStatusLine();
      input.addEventListener('paste', function(e) { e.preventDefault(); });
      input.addEventListener('input', function() {
        handleTyping(item);
      });
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (getState(item).isCorrect) nextQuestion();
        }
      });
      btnHelp.addEventListener('click', function() {
        revealNextLetter(item);
      });
      btnPrev.addEventListener('click', function() { previousQuestion(); });
      btnNext.addEventListener('click', function() { nextQuestion(); });
    }
    function updateStatusLine() {
      const item = currentItems[currentIndex];
      if (!item) return;
      const st = getState(item);
      const el = document.getElementById('statusLine');
      if (!el) return;
      if (st.isCorrect) {
        el.innerHTML = '<span class="ok">Mot complet.</span>';
      } else if (st.userAnswer !== '') {
        el.innerHTML = '<span class="warn">Réponse en cours.</span>';
      } else {
        el.innerHTML = '';
      }
      const err = document.getElementById('errorCount');
      const rev = document.getElementById('reviewFlag');
      const btnHelp = document.getElementById('btnHelp');
      if (err) err.textContent = st.errorCount;
      if (rev) {
        rev.textContent = st.isMarkedForReview ? 'Oui' : 'Non';
        rev.className = 'info-value ' + (st.isMarkedForReview ? 'review-yes' : 'review-no');
      }
      if (btnHelp) btnHelp.disabled = st.isCorrect || st.userAnswer.length >= item.a.length;
    }
    function handleTyping(item) {
      const input = document.getElementById('userAnswer');
      const st = getState(item);
      const previous = st.userAnswer || '';
      const typed = input.value || '';
      if (typed === previous) return;
      if (typed.length < previous.length) {
        st.userAnswer = typed;
        recomputeState(item);
        updateStatusLine();
        return;
      }
      if (typed.length > previous.length + 1) {
        input.value = previous;
        input.setSelectionRange(previous.length, previous.length);
        return;
      }
      const nextPos = typed.length;
      const expectedPrefix = item.a.substring(0, nextPos);
      if (typed !== expectedPrefix) {
        st.errorCount += 1;
        input.value = previous;
        input.setSelectionRange(previous.length, previous.length);
        recomputeState(item);
        updateStatusLine();
        return;
      }
      st.userAnswer = typed;
      recomputeState(item);
      updateStatusLine();
    }
    function revealNextLetter(item) {
      const input = document.getElementById('userAnswer');
      const st = getState(item);
      if (st.isCorrect) return;
      const nextPos = st.userAnswer.length + 1;
      if (nextPos > item.a.length) return;
      st.userAnswer = item.a.substring(0, nextPos);
      st.errorCount += 1;
      st.helpCount += 1;
      input.value = st.userAnswer;
      input.setSelectionRange(st.userAnswer.length, st.userAnswer.length);
      recomputeState(item);
      updateStatusLine();
      input.focus();
    }
    function nextQuestion() {
      currentIndex += 1;
      renderQuestion();
    }
    function previousQuestion() {
      if (currentIndex > 0) {
        currentIndex -= 1;
        renderQuestion();
      }
    }
    function shuffleQuestions() {
      const currentId = currentItems[currentIndex] ? currentItems[currentIndex].id : null;
      currentMode = 'all';
      currentItems = [...items];
      if (currentItems.length > 1) {
        let attempts = 0;
        do {
          shuffleArray(currentItems);
          attempts += 1;
        } while (currentItems[0].id === currentId && attempts < 10);
      }
      currentIndex = 0;
      saveOrder();
      renderQuestion();
    }
    function restartSession() {
      if (!confirm('Recommencer la session depuis zéro ?')) return;
      items.forEach(item => {
        savedResults[item.id] = getDefaultState(item);
      });
      saveResults();
      currentMode = 'all';
      if (!loadSavedOrder()) currentItems = [...items];
      currentIndex = 0;
      renderQuestion();
    }
    function reviewPending() {
      const pendingItems = getPendingItems();
      if (pendingItems.length === 0) {
        alert('Tout est validé.');
        return;
      }
      pendingItems.forEach(item => {
        savedResults[item.id] = getDefaultState(item);
      });
      saveResults();
      currentMode = 'pending';
      currentItems = pendingItems;
      currentIndex = 0;
      renderQuestion();
    }
    function resetProgress() {
      if (!confirm('Effacer toute la progression mémorisée ?')) return;
      localStorage.removeItem(storageKey);
      localStorage.removeItem(orderKey);
      savedResults = {};
      currentItems = [...items];
      currentIndex = 0;
      currentMode = 'all';
      renderQuestion();
    }
    function renderDone() {
      const card = document.getElementById('quizCard');
      const validCount = getValidCount();
      const correctCount = getCorrectCount();
      const pendingCount = getPendingItems().length;
      card.innerHTML =
        '<div class="done">' +
        '<h2>Session terminée</h2>' +
        '<div class="big">Corrects : ' + correctCount + ' / ' + items.length + '</div>' +
        '<div style="margin-bottom:10px;">Validés dans la tolérance : ' + validCount + ' / ' + items.length + '</div>' +
        '<div style="margin-bottom:20px;">Éléments restant à valider : ' + pendingCount + '</div>' +
        '<button onclick="restartSession()">Recommencer cette session</button> ' +
        '<button onclick="reviewPending()">Revoir éléments non validés</button>' +
        '</div>';
    }
    function renderEmpty() {
      const card = document.getElementById('quizCard');
      card.innerHTML =
        '<div class="done">' +
        '<h2>Aucun élément à afficher</h2>' +
        '<button onclick="restartSession()">Revenir à la session complète</button>' +
        '</div>';
    }
    loadSavedOrder();
    saveOrder();
    renderQuestion();
  </script>
</body>
</html>
